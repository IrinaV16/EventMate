{% extends "base.html" %}

{% block content %}

<div class="center-page">

    <div class="auth-card">

        <h1>Welcome back</h1>

        <p>Login to continue to EventMate</p>

        {% if error_message %}
            <p style="color:red;">{{ error_message }}</p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username">

            <input
                type="password"
                name="password"
                placeholder="Password">

            <button type="submit">
                Login
            </button>

        </form>

        <a href="{% url 'register' %}" class="link">
            Don't have an account? Register
        </a>

    </div>

</div>

{% endblock %}
