{% extends "base.html" %}

{% block content %}

<div class="center-page">

    <div class="auth-card">

        <h1>Create account</h1>

        {% if error_message %}
            <p style="color:red;">{{ error_message }}</p>
        {% endif %}
        
        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username">

            <input
                type="email"
                name="email"
                placeholder="Email">

            <input
                type="password"
                name="password1"
                placeholder="Password">

            <input
                type="password"
                name="password2"
                placeholder="Confirm password">

            <button type="submit">
                Register
            </button>

        </form>

        <a href="{% url 'login' %}" class="link">
            Already have an account? Login
        </a>

    </div>

</div>

{% endblock %}
