{% extends "base.html" %}

{% block content %}

<div class="center-page">

    <div class="auth-card">

        <h1>Edit Profile</h1>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Save Changes
            </button>

        </form>

        <a href="/profile/" class="link">
            Back to Profile
        </a>

    </div>

</div>

{% endblock %}
